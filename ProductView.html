<!DOCTYPE html>
<html>
  <head>
    <base target="_self">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
      :root {
        --ink: #17202a;
        --muted: #667085;
        --line: #d8e2e8;
        --accent: #246482;
        --accent-dark: #18465f;
        --accent-soft: #e4f0f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #17202a;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
      }

      .product-card {
        display: grid;
        grid-template-columns: minmax(220px, 320px) 1fr;
        gap: 28px;
        padding: 24px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .product-image {
        width: 100%;
        min-height: 280px;
        object-fit: contain;
        background: #f7f9fb;
        border-radius: 14px;
        padding: 16px;
      }

      .product-image-placeholder {
        display: grid;
        place-items: center;
        min-height: 280px;
        padding: 24px;
        background: #f7f9fb;
        border-radius: 14px;
        color: #667085;
        text-align: center;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 2rem;
      }

      .product-id {
        margin-bottom: 24px;
        color: #667085;
        font-family: monospace;
      }

      .details {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 12px 20px;
        margin: 0;
      }

      .details dt {
        font-weight: 700;
      }

      .details dd {
        margin: 0;
      }

      .manufacturer-link {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 18px;
        border-radius: 10px;
        background: #246482;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }

      .status-message {
        padding: 24px;
        background: #ffffff;
        border-radius: 14px;
      }

      .detail-section {
        margin-top: 24px;
        padding: 24px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .detail-section h2 {
        margin-top: 0;
      }

      .inventory-location {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 16px 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .inventory-location:last-child {
        border-bottom: 0;
      }

      .inventory-quantity {
        font-size: 1.2rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .secondary-text {
        margin-top: 4px;
        color: #667085;
        font-size: 0.875rem;
      }

      .sds-grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 12px 20px;
        margin: 0;
      }

      .sds-grid dt {
        font-weight: 700;
      }

      .sds-grid dd {
        margin: 0;
      }

      .sds-link {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 18px;
        border-radius: 10px;
        background: #246482;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }

      .app-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        width: min(1180px, 100%);
        margin: 0 auto 22px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 8px 24px rgba(24, 50, 63, 0.08);
        backdrop-filter: blur(10px);
      }

      .nav-brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav-brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-size: 0.95rem;
        font-weight: 900;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .nav-links a {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 8px 12px;
        border-radius: 9px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
        transition: 0.15s ease;
      }

      .nav-links a:hover {
        background: var(--accent-soft);
        color: var(--accent-dark);
      }

      .nav-links a.active {
        background: var(--accent);
        color: white;
        box-shadow: 0 4px 12px rgba(15, 111, 143, 0.2);
      }

      @media (max-width: 760px) {
        .app-nav {
          position: static;
          align-items: flex-start;
          flex-direction: column;
        }

        .nav-links {
          width: 100%;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .nav-links a {
          justify-content: center;
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 14px;
        }

        .product-card {
          grid-template-columns: 1fr;
          padding: 18px;
        }

        .details {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .details dd {
          margin-bottom: 12px;
        }

        .sds-grid {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .sds-grid dd {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="app-nav" aria-label="Klinswork navigation">
      <a
        class="nav-brand"
       href="#" data-view="home" onclick="navigateKlinswork('home'); return false;">
        <span class="nav-brand-mark">K</span>
        <span>Klinswork</span>
      </a>

      <div class="nav-links">
        <a href="#" data-view="home" onclick="navigateKlinswork('home'); return false;">
          Home
        </a>

        <a
          class="active"
          aria-current="page"
         href="#" data-view="products" onclick="navigateKlinswork('products'); return false;">
          Products
        </a>

        <a href="#" data-view="inventory" onclick="navigateKlinswork('inventory'); return false;">
          Inventory
        </a>

        <a href="#" data-view="sds" onclick="navigateKlinswork('sds'); return false;">
          SDS Directory
        </a>
      </div>
    </nav>

    <main id="product-page">
      <section class="status-message">
        Loading product...
      </section>
    </main>

    <script>
      const productPage = document.getElementById('product-page');

      let currentProductId = '';

      google.script.url.getLocation(function(location) {
        currentProductId = location.parameter.id;

        console.log('Product ID:', currentProductId);

        if (!currentProductId) {
          showError({
            message: 'No product ID was provided in the URL.'
          });
          return;
        }

        google.script.run
          .withSuccessHandler(renderProduct)
          .withFailureHandler(showError)
          .getProduct(currentProductId);
      });

      function renderProduct(product) {
        if (!product) {
          showError({
            message: 'No matching product was found.'
          });
          return;
        }

        const imageMarkup = product.imageUrl
          ? `
            <img
              class="product-image"
              src="${escapeHtml(product.imageUrl)}"
              alt="${escapeHtml(product.productName)}"
            >
          `
          : `
            <div class="product-image-placeholder">
              No product image available
            </div>
          `;

        const manufacturerLink = product.manufacturerPageUrl
          ? `
            <a
              class="manufacturer-link"
              href="${escapeHtml(product.manufacturerPageUrl)}"
              target="_blank"
              rel="noopener noreferrer"
            >
              Open manufacturer product page
            </a>
          `
          : '';

        productPage.innerHTML = `
          <article class="product-card">
            <div>
              ${imageMarkup}
            </div>

            <section>
              <h1>${escapeHtml(product.productName)}</h1>

              <div class="product-id">
                ${escapeHtml(product.productId)}
              </div>

              <dl class="details">
                <dt>Manufacturer</dt>
                <dd>${displayValue(product.manufacturer)}</dd>

                <dt>Manufacturer code</dt>
                <dd>${displayValue(product.productCode)}</dd>

                <dt>Category</dt>
                <dd>${displayValue(product.category)}</dd>

                <dt>Container size</dt>
                <dd>${displayValue(product.containerSize)}</dd>

                <dt>Inventory unit</dt>
                <dd>${displayValue(product.inventoryUnit)}</dd>
              </dl>

              ${manufacturerLink}
            </section>
          </article>

          <section class="detail-section">
            <h2>Inventory by Location</h2>

            <div id="inventory-by-location">
              <p>Loading inventory...</p>
            </div>
          </section>

          <section class="detail-section">
            <h2>Current SDS</h2>

            <div id="current-sds">
              <p>Loading SDS...</p>
            </div>
          </section>
        `;

        loadInventoryByLocation();
        loadCurrentSds();
      }

      function renderInventoryByLocation(items) {
        const inventoryContainer =
          document.getElementById('inventory-by-location');

        if (!items || items.length === 0) {
          inventoryContainer.innerHTML = `
            <p>No inventory is currently recorded for this product.</p>
          `;
          return;
        }

        inventoryContainer.innerHTML = items
          .map(function(item) {
            return `
              <article class="inventory-location">
                <div>
                  <strong>${escapeHtml(item.locationName)}</strong>
                  <div class="secondary-text">
                    ${escapeHtml(item.locationId)}
                  </div>
                </div>

                <div class="inventory-quantity">
                  ${formatQuantity(item.quantity, item.unit)}
                </div>
              </article>
            `;
          })
          .join('');
      }

      function loadInventoryByLocation() {
        google.script.run
          .withSuccessHandler(function(inventory) {
            const matchingInventory = inventory.filter(function(item) {
              return String(item.productId) === String(currentProductId);
            });

            renderInventoryByLocation(matchingInventory);
          })
          .withFailureHandler(showError)
          .getCurrentInventory();
      }

      function loadCurrentSds() {
        google.script.run
          .withSuccessHandler(renderCurrentSds)
          .withFailureHandler(showSdsError)
          .getCurrentSds(currentProductId);
      }

      function renderCurrentSds(sds) {
        const sdsContainer =
          document.getElementById('current-sds');

        if (!sds) {
          sdsContainer.innerHTML = `
            <p>No current SDS is recorded for this product.</p>
          `;
          return;
        }

        const documentLink = sds.documentUrl
          ? `
            <a
              class="sds-link"
              href="${escapeHtml(sds.documentUrl)}"
              target="_blank"
              rel="noopener noreferrer"
            >
              Open current SDS
            </a>
          `
          : '';

        sdsContainer.innerHTML = `
          <dl class="sds-grid">
            <dt>SDS ID</dt>
            <dd>${displayValue(sds.sdsId)}</dd>

            <dt>Revision date</dt>
            <dd>${formatDate(sds.revisionDate)}</dd>

            <dt>Verified date</dt>
            <dd>${formatDate(sds.dateVerified)}</dd>

            <dt>Source</dt>
            <dd>${displayValue(sds.source)}</dd>
          </dl>

          ${documentLink}
        `;
      }

      function showSdsError(error) {
        const sdsContainer =
          document.getElementById('current-sds');

        if (!sdsContainer) {
          showError(error);
          return;
        }

        const message =
          error && error.message
            ? error.message
            : 'An unknown error occurred.';

        sdsContainer.innerHTML = `
          <p>Unable to load SDS information.</p>
          <p class="secondary-text">${escapeHtml(message)}</p>
        `;
      }

      function formatDate(value) {
        if (!value) {
          return 'Not provided';
        }

        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
          return escapeHtml(value);
        }

        return escapeHtml(
          date.toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          })
        );
      }

      function formatQuantity(quantity, unit) {
        const numericQuantity = Number(quantity) || 0;
        const safeUnit = escapeHtml(unit || 'item');

        const displayedUnit =
          numericQuantity === 1
            ? safeUnit
            : pluralizeUnit(safeUnit);

        return `${numericQuantity} ${displayedUnit}`;
      }

      function pluralizeUnit(unit) {
        if (unit.endsWith('s')) {
          return unit;
        }

        return `${unit}s`;
      }

      function showError(error) {
        const message =
          error && error.message
            ? error.message
            : 'An unknown error occurred.';

        productPage.innerHTML = `
          <section class="status-message">
            <h1>Unable to load product</h1>
            <p>${escapeHtml(message)}</p>
          </section>
        `;
      }

      function displayValue(value) {
        return value
          ? escapeHtml(value)
          : 'Not provided';
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  
  <script>
    function navigateKlinswork(view, id) {
      const allowedViews = new Set([
        'home',
        'products',
        'inventory',
        'product',
        'sds'
      ]);

      if (!allowedViews.has(view)) {
        return;
      }

      window.top.postMessage(
        {
          type: 'klinswork:navigate',
          view: view,
          id: id || ''
        },
        '*'
      );
    }
  </script>

</body>
</html>
