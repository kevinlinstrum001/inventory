<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>Klinswork Inventory</title>

  <style>
    :root {
      --ink: #18323f;
      --muted: #647783;
      --line: #d8e2e8;
      --panel: #ffffff;
      --page: #f4f7f9;
      --accent: #0f6f8f;
      --accent-dark: #0b5269;
      --accent-soft: #dff1f7;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 62px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 4px 16px rgba(24, 50, 63, 0.07);
      z-index: 2;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 900;
    }

    .brand-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
    }

    .site-nav button {
      min-height: 38px;
      padding: 8px 11px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
    }

    .site-nav button:hover {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .site-nav button.active {
      background: var(--accent);
      color: #fff;
    }

    .frame-wrap {
      min-width: 0;
      min-height: 0;
      background: var(--page);
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--page);
    }

    @media (max-width: 760px) {
      body {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .site-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-nav {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        width: 100%;
      }

      .site-nav button {
        padding-inline: 6px;
        font-size: 0.78rem;
      }
    }
  </style>
</head>

<body>
  <header class="site-bar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">K</span>
      <span class="brand-text">Klinswork Inventory</span>
    </div>

    <nav class="site-nav" aria-label="Inventory navigation">
      <button type="button" data-view="home">Home</button>
      <button type="button" data-view="products">Products</button>
      <button type="button" data-view="inventory">Inventory</button>
      <button type="button" data-view="sds">SDS</button>
    </nav>
  </header>

  <main class="frame-wrap">
    <iframe
      id="inventoryApp"
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec?view=home"
      title="Klinswork Inventory application"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </main>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec';
    const appFrame = document.getElementById('inventoryApp');
    const allowedViews = new Set([
      'home',
      'products',
      'inventory',
      'product',
      'sds'
    ]);

    function openView(view, id = '') {
      if (!allowedViews.has(view)) {
        return;
      }

      const url = new URL(APP_URL);
      url.searchParams.set('view', view);

      if (view === 'product' && id) {
        url.searchParams.set('id', id);
      }

      appFrame.src = url.toString();
      setActiveView(view === 'product' ? 'products' : view);
    }

    function setActiveView(view) {
      document.querySelectorAll('.site-nav button').forEach(button => {
        button.classList.toggle(
          'active',
          button.dataset.view === view
        );
      });
    }

    document.querySelectorAll('.site-nav button').forEach(button => {
      button.addEventListener('click', () => {
        openView(button.dataset.view);
      });
    });

    window.addEventListener('message', event => {
      const data = event.data;

      if (
        !data ||
        data.type !== 'klinswork:navigate' ||
        !allowedViews.has(data.view)
      ) {
        return;
      }

      openView(data.view, data.id || '');
    });

    setActiveView('home');
  </script>
</body>
</html>
