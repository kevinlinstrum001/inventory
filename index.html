<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Klinswork Inventory</title>

  <style>
    :root {
      --ink: #18323f;
      --muted: #647783;
      --line: #d8e2e8;
      --panel: #ffffff;
      --page: #f4f7f9;
      --accent: #0f6f8f;
      --accent-dark: #0b5269;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 4px 16px rgba(24, 50, 63, 0.07);
      z-index: 2;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 900;
    }

    .brand-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .standalone-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 9px;
      background: var(--accent);
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .standalone-link:hover {
      background: var(--accent-dark);
    }

    .frame-wrap {
      min-width: 0;
      min-height: 0;
      background: var(--page);
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--page);
    }

    .noscript-message {
      margin: 20px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .site-bar {
        padding: 8px 10px;
      }

      .brand-text {
        max-width: 150px;
      }

      .standalone-link {
        padding-inline: 10px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>

<body>
  <header class="site-bar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">K</span>
      <span class="brand-text">Klinswork Inventory</span>
    </div>

    <a
      class="standalone-link"
      href="https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec?view=home"
      target="_blank"
      rel="noopener noreferrer"
    >
      Open standalone
    </a>
  </header>

  <main class="frame-wrap">
    <iframe
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec?view=home"
      title="Klinswork Inventory application"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-read; clipboard-write"
    ></iframe>

    <noscript>
      <div class="noscript-message">
        JavaScript is required to use Klinswork Inventory.
      </div>
    </noscript>
  </main>
</body>
</html>
