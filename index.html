<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>Klinswork Inventory</title>

  <style>
    :root {
      --page: #f4f7f9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--page);
    }

    .frame-wrap {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      background: var(--page);
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--page);
    }
  </style>
</head>

<body>
  <main class="frame-wrap">
    <iframe
      id="inventoryApp"
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec?view=home"
      title="Klinswork Inventory application"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </main>

  <script>
    const APP_URL =
      'https://script.google.com/macros/s/AKfycbxQXgnsG7-OdEubiM0_iJjU1pULoitNlrcWTdJtIZhT3miBQt_WBrBP7Z9K2N8kxQ5R1Q/exec';

    const appFrame = document.getElementById('inventoryApp');

    const allowedViews = new Set([
      'home',
      'products',
      'inventory',
      'product',
      'sds'
    ]);

    function openView(view, id = '') {
      if (!allowedViews.has(view)) {
        return;
      }

      const url = new URL(APP_URL);
      url.searchParams.set('view', view);

      if (view === 'product' && id) {
        url.searchParams.set('id', id);
      }

      appFrame.src = url.toString();
    }

    window.addEventListener('message', event => {
      const data = event.data;

      if (
        !data ||
        data.type !== 'klinswork:navigate' ||
        !allowedViews.has(data.view)
      ) {
        return;
      }

      openView(data.view, data.id || '');
    });
  </script>
</body>
</html>
